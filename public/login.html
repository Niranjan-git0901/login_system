<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>Login</h1>

        <form id="loginForm">

            <input
                type="email"
                name="email"
                placeholder="Enter Email"
                required
            >

            <input
                type="password"
                name="password"
                placeholder="Enter Password"
                required
            >

            <button type="submit">
                Login
            </button>

        </form>

        <p>
            Don't have an account?
            <a href="signup.html">Signup</a>
        </p>

    </div>
<script>

const form =
document.getElementById("loginForm");

form.addEventListener(
    "submit",
    async (e) => {

        e.preventDefault();

        const formData =
        new FormData(form);

        const data =
        Object.fromEntries(formData);

        const response =
        await fetch(
            "/login",
            {
                method: "POST",

                headers: {
                    "Content-Type":
                    "application/json"
                },

                body:
                JSON.stringify(data)
            }
        );

        const result =
        await response.json();

       if(result.token){

    localStorage.setItem(
        "token",
        result.token
    );

    alert(
        "Login Success"
    );

    window.location.href =
    "/dashboard.html";

}
        else{

            alert(
                result.message
            );

        }

    }
);

</script>
</body>
</html>
